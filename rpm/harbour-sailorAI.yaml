Name: harbour-sailorAI
Summary: AI chat interface for Sailfish OS
Version: 0.1
Release: 1
# The contents of the Group field should be one of the groups listed here:
# https://github.com/mer-tools/spectacle/blob/master/data/GROUPS
Group: Qt/Qt
URL: http://example.org/
BuildArch: noarch
License: LICENSE
# This must be generated before uploading a package to a remote build service.
# Usually this line does not need to be modified.
Sources:
- '%{name}-%{version}.tar.bz2'
Description: |
  SailorAI is an AI chat interface for Sailfish OS supporting multiple LLM providers
  (OpenAI, Anthropic Claude, Google Gemini, Ollama) with real-time streaming,
  Markdown rendering, image/document upload, web tools and conversation history.
  Best tested with remote ollama.com endpoints. Actively developed with agentic coding.
Builder: qmake5

# This section specifies build dependencies that are resolved using pkgconfig.
# This is the preferred way of specifying build dependencies for your package.
PkgConfigBR:
  - sailfishapp >= 1.0.3
  - Qt5Core
  - Qt5Qml
  - Qt5Quick

# Build dependencies without a pkgconfig setup can be listed here
# PkgBR:
#   - package-needed-to-build

# Runtime dependencies which are not automatically detected
Requires:
  - sailfishsilica-qt5 >= 0.10.9
  - libsailfishapp-launcher
  - nemo-qml-plugin-dbus-qt5
  - sailfishshare-components

# Update share cache so SailorAI appears in the Sailfish share sheet
PostInstall: |
  /usr/bin/sailfish-share-update-cache || true

# All installed files
Files:
  - '%defattr(0644,root,root,-)'
  - '%{_datadir}/%{name}'
  - '%{_datadir}/applications/%{name}.desktop'
  - '%{_datadir}/icons/hicolor/*/apps/%{name}.png'
  - '%{_datadir}/dbus-1/services/harbour.harbour-sailorAI.service'

# For more information about yaml and what's supported in Sailfish OS
# build system, please see https://wiki.merproject.org/wiki/Spectacle
