name: Build Sailfish OS RPM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare workspace permissions for SDK user
        run: sudo chown -R 100000:100000 "$PWD"

      - name: Build noarch RPM in SDK container
        run: |
          docker run --rm \
            -v "$PWD":/home/mersdk/harbour-sailorAI \
            -w /home/mersdk/harbour-sailorAI \
            coderus/sailfishos-platform-sdk-aarch64:4.6.0.13 \
            bash -c "export HOME=/home/mersdk && mb2 -t SailfishOS-4.6.0.13-aarch64 build"

      - name: Restore workspace permissions
        run: sudo chown -R "$(id -u)":"$(id -g)" "$PWD"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: RPMS/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm
          path: RPMS/

      - name: Upload to continuous release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: continuous
          name: Continuous Build
          body: "Automatischer Build vom ${{ github.sha }}"
          prerelease: true
          files: RPMS/*.rpm
